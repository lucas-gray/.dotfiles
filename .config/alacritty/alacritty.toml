# Alacritty configuration

[window]
dynamic_padding = true
decorations = "Buttonless"
opacity = 1
startup_mode = "Maximized"

[font]
normal = { family = "JetBrainsMono Nerd Font" }
size = 24

[keyboard]
bindings = [
    { key = "Return", mods = "Shift", chars = "\n" }
]

[general]
import = ["rose-pine.toml"]
